name: Build and Release

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller -F SyncOnelapToXoss.py --name SyncOnelapToXoss --noconfirm

      - name: Prepare package
        shell: pwsh
        run: |
          $refName = $env:GITHUB_REF_NAME
          if ($refName -like 'refs/tags/*') {
            $refName = $refName -replace 'refs/tags/', ''
          }
          $packageName = "SyncOnelapToXoss_${refName}_Windows_x86_64"
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/SyncOnelapToXoss.exe package/ -Force
          if (Test-Path settings.template.ini) {
            Copy-Item settings.template.ini package/settings.ini -Force
          } elseif (Test-Path settings.ini.example) {
            Copy-Item settings.ini.example package/settings.ini -Force
          } elseif (Test-Path settings.ini) {
            Copy-Item settings.ini package/ -Force
          }
          if (Test-Path README.md) { Copy-Item README.md package/ -Force }
          if (Test-Path requirements.txt) { Copy-Item requirements.txt package/ -Force }
          Compress-Archive -Path package/* -DestinationPath "${packageName}.zip" -Force
          echo "PACKAGE_NAME=${packageName}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: ${{ env.PACKAGE_NAME }}.zip
          if-no-files-found: error
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller -F SyncOnelapToXoss.py --name SyncOnelapToXoss --noconfirm

      - name: Prepare package
        run: |
          REF_NAME="${GITHUB_REF_NAME#refs/tags/}"
          PACKAGE_NAME="SyncOneLapToXoss_${REF_NAME}_Linux_x86_64"
          mkdir -p package
          cp dist/SyncOneLapToXoss package/ 2>/dev/null || cp dist/SyncOnelapToXoss package/
          chmod +x package/SyncOneLapToXoss 2>/dev/null || chmod +x package/SyncOnelapToXoss
          if [ -f settings.template.ini ]; then
            cp settings.template.ini package/settings.ini
          elif [ -f settings.ini.example ]; then
            cp settings.ini.example package/settings.ini
          elif [ -f settings.ini ]; then
            cp settings.ini package/
          fi
          if [ -f README.md ]; then
            cp README.md package/
          fi
          if [ -f requirements.txt ]; then
            cp requirements.txt package/
          fi
          cd package && tar czf "../${PACKAGE_NAME}.tar.gz" * && cd ..
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: ${{ env.PACKAGE_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract release notes for current tag
        id: extract-notes
        run: |
          # Extract the current tag without refs/tags/ prefix
          TAG_NAME="${GITHUB_REF_NAME#refs/tags/}"
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT

          # Extract release notes for the current tag from RELEASE_NOTES.md
          # Find the section starting with "## vX.Y.Z" and ending before the next "## vX.Y.Z"
          awk -v tag="## ${TAG_NAME}" '
            BEGIN { in_section=0; output=0 }
            /^## v[0-9]+\.[0-9]+\.[0-9]+/ {
              if (in_section) { exit }
              if ($0 == tag) { in_section=1; next }
            }
            in_section { print }
          ' RELEASE_NOTES.md > release_body.md

          echo "Release notes extracted:"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-package/*.zip
            linux-package/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
