name: Windows Build

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller -F SyncOnelapToXoss.py --name SyncOnelapToXoss --noconfirm

      - name: Prepare package
        shell: pwsh
        run: |
          $refName = $env:GITHUB_REF_NAME
          if ($refName -like 'refs/tags/*') {
            $refName = $refName -replace 'refs/tags/', ''
          }
          $packageName = "SyncOnelapToXoss_${refName}_Windows_x86_64"
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/SyncOnelapToXoss.exe package/ -Force
          if (Test-Path settings.template.ini) {
            Copy-Item settings.template.ini package/settings.ini -Force
          } elseif (Test-Path settings.ini.example) {
            Copy-Item settings.ini.example package/settings.ini -Force
          } elseif (Test-Path settings.ini) {
            Copy-Item settings.ini package/ -Force
          }
          if (Test-Path README.md) { Copy-Item README.md package/ -Force }
          if (Test-Path requirements.txt) { Copy-Item requirements.txt package/ -Force }
          Compress-Archive -Path package/* -DestinationPath "${packageName}.zip" -Force
          echo "PACKAGE_NAME=${packageName}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_NAME }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PACKAGE_NAME }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
